spring.application.name=prescan
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:prescandb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# For future MySQL switch, comment out H2 above and use below:
# spring.datasource.url=jdbc:mysql://localhost:3306/prescandb?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
