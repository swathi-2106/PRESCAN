<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PRESCAN</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.1);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      background-color: var(--bg);
      color: var(--text);
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .container {
      padding: 16px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    button:disabled {
      background-color: var(--surface);
      color: var(--muted);
      cursor: not-allowed;
    }
    .loader {
      display: none;
      border: 2px solid var(--border);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .result {
      margin-top: 16px;
      display: none;
    }
    .result-cards {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 0;
      text-align: center;
    }
    .card .count {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .card .label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .danger { color: var(--danger); }
    .warning { color: var(--warning); }
    .success { color: var(--success); }
    
    .link-btn {
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      margin-top: 8px;
    }
    .link-btn:hover {
      background-color: rgba(255,255,255,0.05);
    }
    #errorMsg {
      color: var(--danger);
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    <h1>PRESCAN</h1>
  </div>
  
  <div class="container">
    <div class="input-group">
      <label>Target URL</label>
      <input type="text" id="targetUrl" placeholder="https://example.com" />
    </div>
    <button id="scanBtn">Scan Application</button>
    
    <div class="loader" id="loader"></div>
    <div id="errorMsg"></div>

    <div class="result" id="resultView">
      <div class="result-cards">
        <div class="card">
          <div class="count danger" id="highCount">0</div>
          <div class="label">High</div>
        </div>
        <div class="card">
          <div class="count warning" id="mediumCount">0</div>
          <div class="label">Medium</div>
        </div>
        <div class="card">
          <div class="count success" id="lowCount">0</div>
          <div class="label">Low</div>
        </div>
      </div>
      <button class="link-btn" id="dashboardBtn">Open Detailed Report</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
